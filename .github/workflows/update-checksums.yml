name: Update Checksums

on:
  pull_request:
    branches: [main]
    paths:
      - "base/Dockerfile"

permissions:
  contents: write

jobs:
  update-checksums:
    # Only run on Renovate PRs to avoid unintended modifications on human PRs
    if: startsWith(github.head_ref, 'renovate/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update checksums
        run: bash scripts/update-checksums.sh

      - name: Commit updated checksums
        run: |
          git diff --quiet base/Dockerfile && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add base/Dockerfile
          git commit -m "Update checksums for pinned tool versions"
          git push
