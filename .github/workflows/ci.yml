name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: base
          push: false
          tags: sbx-templates:base
          outputs: type=docker,dest=/tmp/base-image.tar

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: base-image
          path: /tmp/base-image.tar
          retention-days: 1

  build-languages:
    needs: build-base
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [bun, rust, golang, python]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          driver: docker

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: base-image
          path: /tmp

      - name: Load base image
        run: docker load -i /tmp/base-image.tar

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.image }}
          push: false
          build-args: |
            BASE_IMAGE=sbx-templates:base

  ci:
    if: always()
    needs: [build-base, build-languages]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ needs.build-base.result }}" != "success" || "${{ needs.build-languages.result }}" != "success" ]]; then
            exit 1
          fi
